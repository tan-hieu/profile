<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="LearnOva Online Learning Platform - Before and After">
  <defs>
    <linearGradient id="bg-learnova" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <marker id="arrow-lo" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#eab308"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="url(#bg-learnova)"/>
  <text x="400" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1e3a8a">LearnOva Online Learning Platform</text>

  <!-- Before -->
  <rect x="40" y="80" width="200" height="320" rx="12" fill="#ffffff" stroke="#1e3a8a" stroke-width="2"/>
  <text x="140" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1e3a8a">Before</text>
  <rect x="70" y="150" width="140" height="70" rx="8" fill="#1e3a8a" opacity="0.12"/>
  <text x="140" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1e3a8a">Monolithic idea</text>
  <text x="140" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Direct video upload</text>
  <rect x="70" y="240" width="140" height="50" rx="6" fill="#eab308" opacity="0.2"/>
  <text x="140" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#1e3a8a">Basic auth concept</text>
  <rect x="70" y="310" width="140" height="60" rx="6" fill="#1e3a8a" opacity="0.08"/>
  <text x="140" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">No CDN / payment</text>

  <!-- Migration -->
  <rect x="280" y="140" width="240" height="200" rx="12" fill="#ffffff" stroke="#eab308" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="400" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ca8a04">Migration</text>
  <text x="400" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">HLS conversion</text>
  <text x="400" y="228" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Payment webhook</text>
  <text x="400" y="251" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Revenue logic</text>
  <text x="400" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#1e3a8a">Portfolio demo build</text>

  <!-- After -->
  <rect x="560" y="80" width="200" height="320" rx="12" fill="#ffffff" stroke="#1e3a8a" stroke-width="2"/>
  <text x="660" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1e3a8a">After</text>
  <rect x="590" y="130" width="140" height="45" rx="6" fill="#1e3a8a" opacity="0.12"/>
  <text x="660" y="158" text-anchor="middle" font-family="monospace" font-size="12" fill="#1e3a8a">React + Spring Boot</text>
  <rect x="590" y="185" width="140" height="45" rx="6" fill="#eab308" opacity="0.22"/>
  <text x="660" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#1e3a8a">HLS streaming</text>
  <text x="660" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">CloudFront CDN</text>
  <rect x="590" y="240" width="140" height="45" rx="6" fill="#1e3a8a" opacity="0.1"/>
  <text x="660" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#1e3a8a">PayOS + webhook</text>
  <text x="660" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Revenue / commission</text>
  <rect x="590" y="295" width="140" height="45" rx="6" fill="#eab308" opacity="0.15"/>
  <text x="660" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#1e3a8a">AWS S3</text>
  <text x="660" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">MediaConvert</text>
  <rect x="590" y="350" width="140" height="40" rx="6" fill="#1e3a8a" opacity="0.08"/>
  <text x="660" y="375" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">PostgreSQL</text>

  <line x1="240" y1="250" x2="275" y2="250" stroke="#eab308" stroke-width="3" marker-end="url(#arrow-lo)"/>
  <line x1="520" y1="250" x2="555" y2="250" stroke="#eab308" stroke-width="3" marker-end="url(#arrow-lo)"/>

  <text x="400" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Full-stack demo · HLS + CloudFront · PayOS webhook · Revenue logic</text>
</svg>
