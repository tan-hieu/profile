<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Handy Terminal System Migration - Before and After">
  <defs>
    <linearGradient id="bg-handy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <marker id="arrow-handy" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#eab308"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="url(#bg-handy)"/>
  <text x="400" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1e3a8a">Handy Terminal System Migration</text>

  <!-- Before -->
  <rect x="40" y="80" width="200" height="320" rx="12" fill="#ffffff" stroke="#1e3a8a" stroke-width="2"/>
  <text x="140" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1e3a8a">Before</text>
  <rect x="70" y="140" width="140" height="80" rx="8" fill="#1e3a8a" opacity="0.12"/>
  <text x="140" y="175" text-anchor="middle" font-family="monospace" font-size="13" fill="#1e3a8a">BHT Device</text>
  <text x="140" y="195" text-anchor="middle" font-family="monospace" font-size="12" fill="#64748b">BHT-OS</text>
  <rect x="70" y="240" width="140" height="50" rx="6" fill="#eab308" opacity="0.25"/>
  <text x="140" y="270" text-anchor="middle" font-family="monospace" font-size="13" fill="#1e3a8a">BHT-BASIC</text>
  <rect x="70" y="310" width="140" height="60" rx="6" fill="#1e3a8a" opacity="0.08"/>
  <text x="140" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Server / DB</text>

  <!-- Migration -->
  <rect x="280" y="160" width="240" height="160" rx="12" fill="#ffffff" stroke="#eab308" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="400" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ca8a04">Migration</text>
  <text x="400" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Business analysis</text>
  <text x="400" y="248" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Function conversion</text>
  <text x="400" y="271" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Device switch</text>

  <!-- After -->
  <rect x="560" y="80" width="200" height="320" rx="12" fill="#ffffff" stroke="#1e3a8a" stroke-width="2"/>
  <text x="660" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1e3a8a">After</text>
  <rect x="590" y="140" width="140" height="80" rx="8" fill="#1e3a8a" opacity="0.12"/>
  <text x="660" y="172" text-anchor="middle" font-family="monospace" font-size="12" fill="#1e3a8a">Android Device</text>
  <text x="660" y="192" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">Keyence BT-A1000</text>
  <rect x="590" y="240" width="140" height="50" rx="6" fill="#eab308" opacity="0.25"/>
  <text x="660" y="270" text-anchor="middle" font-family="monospace" font-size="13" fill="#1e3a8a">VB.NET</text>
  <rect x="590" y="310" width="140" height="60" rx="6" fill="#1e3a8a" opacity="0.08"/>
  <text x="660" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Server / DB</text>

  <!-- Arrows -->
  <line x1="240" y1="250" x2="275" y2="250" stroke="#eab308" stroke-width="3" marker-end="url(#arrow-handy)"/>
  <line x1="520" y1="250" x2="555" y2="250" stroke="#eab308" stroke-width="3" marker-end="url(#arrow-handy)"/>

  <text x="400" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">BHT-BASIC ’ Android + VB.NET · Server unchanged</text>
</svg>
